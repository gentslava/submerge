services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: submerge-mihomo
    restart: unless-stopped
    volumes:
      - ./mihomo:/root/.config/mihomo
    ports:
      - "127.0.0.1:7890:7890"   # SOCKS5 + HTTP (для клиентов / роутера / matter)
      - "127.0.0.1:9090:9090"   # mihomo API (отладка; combine ходит внутри сети)

  combine:
    build: ./combine
    image: ghcr.io/gentslava/submerge-combine:latest
    container_name: submerge-combine
    restart: unless-stopped
    environment:
      MIHOMO_API: "http://mihomo:9090"
      MIHOMO_SECRET: "poc"
      HAPP_DECODER_URL: "http://happ-decoder:8080"
    volumes:
      - ./mihomo:/mihomo            # тот же конфиг, что монтирует mihomo
    ports:
      - "127.0.0.1:3000:3000"       # веб-UI комбайна
    depends_on:
      - mihomo
      - happ-decoder

  happ-decoder:
    build:
      context: ./happ-decoder
      args:
        HAPP_VERSION: "2.18.3"
    image: ghcr.io/gentslava/submerge-happ-decoder:latest
    container_name: submerge-happ-decoder
    restart: unless-stopped
    expose:
      - "8080"                      # внутренний сервис, наружу не публикуется
