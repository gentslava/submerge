# Deploy compose — pulls prebuilt images from GHCR (built by .github/workflows/docker.yml
# on push to master). To build locally instead: `docker build -t ghcr.io/gentslava/submerge .`
# and `docker build -t ghcr.io/gentslava/submerge-happ-decoder ./happ-decoder`.
services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: submerge-mihomo
    # Force the RESTful API on :9090 even on a fresh config volume — mihomo's auto-generated
    # default config has no external-controller, so submerge (MIHOMO_API) couldn't reach it.
    # submerge's generated config keeps external-controller:9090 + secret once sources exist.
    command: -d /root/.config/mihomo -ext-ctl 0.0.0.0:9090
    restart: unless-stopped
    volumes:
      - ./mihomo:/root/.config/mihomo
    ports:
      - "127.0.0.1:7890:7890"   # SOCKS5 + HTTP (для клиентов / роутера / matter)
      - "127.0.0.1:9090:9090"   # mihomo API (отладка; submerge ходит внутри сети по http://mihomo:9090)

  submerge:
    image: ghcr.io/gentslava/submerge:latest
    container_name: submerge
    restart: unless-stopped
    environment:
      MIHOMO_API: "http://mihomo:9090"
      MIHOMO_SECRET: "poc"
      HAPP_DECODER_URL: "http://happ-decoder:8080"
      # Auth off unless ADMIN_PASSWORD is set. Behind TLS, set COOKIE_SECURE=true.
      # ADMIN_PASSWORD: "change-me"
      COOKIE_SECURE: "false"
    volumes:
      - ./mihomo:/mihomo            # shared config + hwid.txt (server writes config.yaml)
      - submerge-data:/app/data     # persistent SQLite DB
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mihomo
      - happ-decoder

  happ-decoder:
    image: ghcr.io/gentslava/submerge-happ-decoder:latest
    container_name: submerge-happ-decoder
    restart: unless-stopped
    init: true                      # tini пожинает зомби-процессы happd
    volumes:
      - ./mihomo:/mihomo:ro         # общий HWID (hwid.txt) для инжекта X-Hwid
    expose:
      - "8080"                      # внутренний сервис, наружу не публикуется

volumes:
  submerge-data:
