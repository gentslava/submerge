<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VPN Combine — PoC</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: #0f1115; color: #e6e8eb; }
  header { padding: 16px 20px; border-bottom: 1px solid #232733; display: flex; align-items: baseline; gap: 12px; }
  h1 { font-size: 16px; margin: 0; }
  .muted { color: #8b93a1; font-size: 12px; }
  main { display: grid; grid-template-columns: 360px 1fr; gap: 0; height: calc(100vh - 53px); }
  .panel { padding: 20px; overflow: auto; }
  .panel + .panel { border-left: 1px solid #232733; }
  label { display: block; font-size: 12px; color: #8b93a1; margin: 12px 0 4px; }
  select, textarea, input { width: 100%; background: #161922; color: #e6e8eb; border: 1px solid #2b3140; border-radius: 8px; padding: 8px 10px; font: inherit; }
  textarea { min-height: 90px; resize: vertical; font-family: ui-monospace, monospace; font-size: 12px; }
  button { background: #3b82f6; color: #fff; border: 0; border-radius: 8px; padding: 9px 14px; font: inherit; cursor: pointer; margin-top: 12px; }
  button.ghost { background: #1c2230; color: #cbd2dc; border: 1px solid #2b3140; }
  button:hover { filter: brightness(1.1); }
  .row { display: flex; gap: 8px; align-items: center; }
  .nodes { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
  .node { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #161922; border: 1px solid #232733; border-radius: 8px; }
  .node.active { border-color: #3b82f6; background: #15203a; }
  .node .nm { flex: 1; font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; }
  .pill { font-size: 11px; padding: 1px 7px; border-radius: 999px; background: #232733; color: #9aa3b2; }
  .pill.ok { background: #14331f; color: #4ade80; }
  .pill.bad { background: #331414; color: #f87171; }
  .src { font-size: 12px; padding: 6px 10px; background: #161922; border: 1px solid #232733; border-radius: 8px; margin-top: 6px; word-break: break-all; }
  .err { color: #f87171; font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
  .sec { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin: 18px 0 4px; }
</style>
</head>
<body>
<header>
  <h1>VPN Combine</h1>
  <span class="muted">PoC · движок mihomo · SOCKS/HTTP 127.0.0.1:7890</span>
</header>
<main>
  <section class="panel">
    <div class="sec">Добавить источник</div>
    <label>Вставь строку — тип определю автоматически</label>
    <textarea id="value" placeholder="vless://…   ·   happ://…   ·   https://…/sub/…"></textarea>
    <div id="detected" class="muted" style="margin-top:6px"></div>
    <div class="row">
      <button id="add">Добавить</button>
      <button id="reset" class="ghost">Сбросить всё</button>
    </div>
    <div id="addErr" class="err"></div>

    <div class="sec">Источники</div>
    <div id="sources"></div>
  </section>

  <section class="panel">
    <div class="row">
      <div class="sec" style="margin:0;flex:1">Узлы (группа PROXY)</div>
      <button id="testAll" class="ghost" style="margin:0">Пинг всех</button>
      <button id="refresh" class="ghost" style="margin:0">Обновить</button>
    </div>
    <div id="active" class="muted" style="margin-top:8px"></div>
    <div id="nodes" class="nodes"></div>
    <div id="stateErr" class="err"></div>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);
let lastDelays = {};

async function api(path, opts) {
  const r = await fetch(path, opts);
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
  return j;
}

async function refresh() {
  $('#stateErr').textContent = '';
  try {
    const st = await api('/api/state');
    // источники
    $('#sources').innerHTML = st.sources.length
      ? st.sources.map((s) => { const ic = s.kind === 'sub' ? '📦' : s.kind === 'happ' ? '🔐' : '🔗'; return `<div class="src">${ic} ${escapeHtml(s.label)} <span class="pill">${s.count} узл.</span></div>`; }).join('')
      : '<div class="muted">пока пусто</div>';

    const groups = st.proxies?.proxies || {};
    const proxyGroup = groups['PROXY'];
    if (!proxyGroup) { $('#nodes').innerHTML = '<div class="muted">ядро ещё не отдало узлы</div>'; return; }
    $('#active').textContent = 'Активно: ' + (proxyGroup.now || '—');

    const items = (proxyGroup.all || []).filter((n) => !['DIRECT', 'REJECT'].includes(n));
    $('#nodes').innerHTML = items.map((n) => {
      const d = lastDelays[n];
      const pill = d == null ? '<span class="pill">—</span>'
        : d === 0 ? '<span class="pill bad">timeout</span>'
        : `<span class="pill ok">${d} ms</span>`;
      const active = proxyGroup.now === n ? ' active' : '';
      return `<div class="node${active}"><span class="nm">${escapeHtml(n)}</span>${pill}<button class="ghost sel" data-n="${escapeAttr(n)}" style="margin:0;padding:4px 10px">выбрать</button></div>`;
    }).join('') || '<div class="muted">нет узлов — добавь источник слева</div>';

    document.querySelectorAll('.sel').forEach((b) => b.onclick = async () => {
      await api('/api/select', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ group: 'PROXY', name: b.dataset.n }) });
      refresh();
    });
    if (st.err) $('#stateErr').textContent = 'mihomo: ' + st.err;
  } catch (e) { $('#stateErr').textContent = String(e.message || e); }
}

$('#value').addEventListener('input', () => {
  const v = $('#value').value.trim();
  let t = '';
  if (!v) t = '';
  else if (v.startsWith('happ://')) t = '🔐 happ';
  else if (v.startsWith('vless://')) t = '🔗 одиночный vless';
  else if (/^https?:\/\//i.test(v)) t = '📦 подписка';
  else t = '❓ base64/неизвестно';
  $('#detected').textContent = v ? ('тип: ' + t) : '';
});

$('#add').onclick = async () => {
  $('#addErr').textContent = '';
  const value = $('#value').value.trim();
  if (!value) return;
  $('#add').disabled = true;
  try {
    const r = await api('/api/sources', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ value }) });
    $('#value').value = ''; $('#detected').textContent = '';
    if (!r.result?.ok) $('#addErr').textContent = 'добавлено как ' + r.kind + ', но reload mihomo вернул статус ' + r.result?.status;
    await refresh();
  } catch (e) { $('#addErr').textContent = String(e.message || e); }
  finally { $('#add').disabled = false; }
};

$('#reset').onclick = async () => { if (confirm('Удалить все источники?')) { await api('/api/reset', { method: 'POST' }); lastDelays = {}; refresh(); } };
$('#refresh').onclick = refresh;

$('#testAll').onclick = async () => {
  const st = await api('/api/state');
  const items = (st.proxies?.proxies?.['PROXY']?.all || []).filter((n) => !['DIRECT', 'REJECT', 'AUTO'].includes(n));
  await Promise.all(items.map(async (n) => {
    try { const d = await api('/api/delay/' + encodeURIComponent(n)); lastDelays[n] = d.delay ?? 0; }
    catch { lastDelays[n] = 0; }
  }));
  refresh();
};

function escapeHtml(s) { return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
