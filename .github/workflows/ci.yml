name: ci

on:
  push:
    branches: [master]
  pull_request:

# A newer push supersedes an in-flight check run of the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .
      - run: pnpm -F @submerge/web design:tokens:check
      - run: pnpm typecheck
      - run: pnpm -r test
      - run: pnpm -F @submerge/web build
      - name: Install Playwright Chromium
        run: pnpm -F @submerge/web exec playwright install --with-deps chromium
      - name: Run web E2E tests
        run: pnpm -F @submerge/web test:e2e
