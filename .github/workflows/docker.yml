name: docker

# Build the submerge + happ-decoder images and publish them to GHCR on every push to
# master. The compose (and Dokploy) deploy by pulling ghcr.io/gentslava/submerge:latest
# and ghcr.io/gentslava/submerge-happ-decoder:latest.
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "pencil/**"
  workflow_dispatch:

# A newer push supersedes an in-flight build of the same ref.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: submerge
            context: .
            file: Dockerfile
          - image: submerge-happ-decoder
            context: ./happ-decoder
            file: ./happ-decoder/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/gentslava/${{ matrix.image }}:latest
            ghcr.io/gentslava/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
