name: docker

# Build the submerge + happ-decoder images and publish them to GHCR on every push to
# master. The compose (and Dokploy) deploy by pulling ghcr.io/gentslava/submerge:latest
# and ghcr.io/gentslava/submerge-happ-decoder:latest.
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "pencil/**"
      - "docker-compose.yml"
  workflow_dispatch:

# A newer push supersedes an in-flight build of the same ref.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: submerge
            context: .
            file: Dockerfile
          - image: submerge-happ-decoder
            context: ./happ-decoder
            file: ./happ-decoder/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Resolve the latest Happ desktop release so happ-decoder builds against it (build-arg
      # below); falls back to the Dockerfile's pinned HAPP_VERSION default if the API is down.
      - id: happ
        if: matrix.image == 'submerge-happ-decoder'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "version=$(gh api repos/Happ-proxy/happ-desktop/releases/latest --jq .tag_name)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ steps.happ.outputs.version && format('HAPP_VERSION={0}', steps.happ.outputs.version) || '' }}
          push: true
          tags: |
            ghcr.io/gentslava/${{ matrix.image }}:latest
            ghcr.io/gentslava/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      # Vulnerability scan of the pushed image — report-only for now (exit-code 0
      # never fails the job). To make it a hard gate once the baseline is clean,
      # set exit-code to "1".
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/gentslava/${{ matrix.image }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
